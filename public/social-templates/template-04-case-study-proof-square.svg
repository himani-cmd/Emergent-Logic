<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Logic case study proof square social template</title>
  <desc id="desc">A reusable square social media graphic for case-study proof points.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.52" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>
  <circle cx="940" cy="192" r="280" fill="#22D3EE" opacity="0.08"/>
  <circle cx="120" cy="946" r="320" fill="#A78BFA" opacity="0.14"/>

  <g transform="translate(72 68)">
    <circle cx="24" cy="24" r="8" fill="#22D3EE"/>
    <circle cx="66" cy="24" r="8" fill="#818CF8"/>
    <circle cx="45" cy="60" r="8" fill="#A78BFA"/>
    <circle cx="24" cy="96" r="8" fill="#818CF8"/>
    <circle cx="66" cy="96" r="8" fill="#22D3EE"/>
    <circle cx="45" cy="132" r="8" fill="#A78BFA"/>
    <path d="M24 24L66 24L45 60L24 24ZM45 60L24 96L66 96L45 60ZM24 96L45 132L66 96" stroke="#E0F2FE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="112" y="52" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="850" letter-spacing="0.06em">EMERGENT LOGIC</text>
    <text x="112" y="90" fill="#BAE6FD" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="0.08em">CASE STUDY FORMAT</text>
  </g>

  <rect x="72" y="220" width="238" height="54" rx="27" fill="#DBEAFE"/>
  <text x="103" y="255" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="850">RESULT STORY</text>

  <!-- EDITABLE TEXT: headline -->
  <text x="72" y="374" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="850" letter-spacing="-0.045em">
    <tspan x="72" dy="0">From scattered</tspan>
    <tspan x="72" dy="82">leads to clear</tspan>
    <tspan x="72" dy="82">follow-up.</tspan>
  </text>

  <g filter="url(#shadow)" transform="translate(72 628)">
    <rect x="0" y="0" width="936" height="252" rx="44" fill="white" fill-opacity="0.09" stroke="white" stroke-opacity="0.16"/>
    <g transform="translate(44 44)">
      <rect width="246" height="164" rx="28" fill="#EFF6FF"/>
      <text x="28" y="52" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850">BEFORE</text>
      <text x="28" y="102" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="850">No clear</text>
      <text x="28" y="139" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="850">owner</text>
    </g>
    <path d="M324 126H418" stroke="url(#line)" stroke-width="12" stroke-linecap="round"/>
    <path d="M388 96L420 126L388 156" stroke="url(#line)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(458 44)">
      <rect width="180" height="164" rx="28" fill="#F5F3FF"/>
      <text x="28" y="52" fill="#6D28D9" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850">FIX</text>
      <text x="28" y="102" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="850">Route +</text>
      <text x="28" y="139" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="850">assign</text>
    </g>
    <path d="M672 126H766" stroke="url(#line)" stroke-width="12" stroke-linecap="round"/>
    <path d="M736 96L768 126L736 156" stroke="url(#line)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(806 44)">
      <rect width="86" height="164" rx="28" fill="#ECFEFF"/>
      <text x="43" y="71" fill="#0891B2" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" text-anchor="middle">OUT</text>
      <text x="43" y="102" fill="#0891B2" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" text-anchor="middle">COME</text>
      <text x="43" y="142" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="900" text-anchor="middle">?</text>
    </g>
  </g>

  <!-- EDITABLE TEXT: footer -->
  <text x="72" y="960" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="800">Use this when sharing a workflow win.</text>
  <text x="1008" y="960" fill="#BAE6FD" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="850" text-anchor="end">emergent-logic.ca</text>
</svg>
