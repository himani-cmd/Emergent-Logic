<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Logic case study proof social template</title>
  <desc id="desc">Brand-faithful square case-study social template using the Emergent Logic navy identity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#223B5F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="250" cy="304" r="176" fill="#2B4E7D" opacity="0.72"/>
  <circle cx="914" cy="910" r="300" fill="#FFFFFF" opacity="0.045"/>

  <g transform="translate(72 70)">
    <circle cx="48" cy="48" r="48" fill="#29486F"/>
    <path d="M29 58L41 36L53 58" stroke="#8FA7CD" stroke-opacity="0.36" stroke-width="1.4"/>
    <path d="M47 58L59 36L71 58" stroke="#8FA7CD" stroke-opacity="0.36" stroke-width="1.4"/>
    <text x="48" y="59" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="700" letter-spacing="1">EL</text>
    <text x="124" y="42" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Emergent Logic</text>
    <text x="124" y="78" fill="#B8C8E6" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Case Study Format</text>
  </g>

  <rect x="72" y="220" width="218" height="52" rx="26" fill="#D7E2F5"/>
  <text x="102" y="254" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850">RESULT STORY</text>

  <!-- EDITABLE TEXT: headline -->
  <text x="72" y="374" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="850" letter-spacing="-2.2">
    <tspan x="72" dy="0">From scattered</tspan>
    <tspan x="72" dy="78">leads to clear</tspan>
    <tspan x="72" dy="78">follow-up.</tspan>
  </text>

  <g filter="url(#shadow)" transform="translate(72 646)">
    <rect width="936" height="234" rx="34" fill="#FFFFFF"/>
    <rect x="42" y="42" width="252" height="150" rx="24" fill="#F4F7FB" stroke="#D9E2F1"/>
    <text x="76" y="86" fill="#637AA0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850">BEFORE</text>
    <text x="76" y="132" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="850">No clear</text>
    <text x="76" y="166" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="850">owner</text>

    <path d="M354 117H448" stroke="#A7B6D8" stroke-width="10" stroke-linecap="round"/>
    <path d="M418 86L450 117L418 148" stroke="#A7B6D8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="494" y="42" width="212" height="150" rx="24" fill="#EEF3FA" stroke="#D9E2F1"/>
    <text x="528" y="86" fill="#637AA0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850">FIX</text>
    <text x="528" y="132" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="850">Route +</text>
    <text x="528" y="166" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="850">assign</text>

    <path d="M760 117H844" stroke="#A7B6D8" stroke-width="10" stroke-linecap="round"/>
    <path d="M814 86L846 117L814 148" stroke="#A7B6D8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="886" cy="117" r="42" fill="#1E3A5F"/>
    <text x="886" y="128" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="900">?</text>
  </g>

  <text x="72" y="958" fill="#D7E2F5" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800">Use this when sharing a workflow win.</text>
  <text x="1008" y="958" fill="#B8C8E6" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" text-anchor="end">emergent-logic.ca</text>
</svg>
