<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Logic lead leak social template</title>
  <desc id="desc">Brand-faithful square social media template using navy, white, muted blue, and EL mark.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F7FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#1E3A5F" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#1E3A5F" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#paper)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>
  <circle cx="910" cy="154" r="260" fill="#1E3A5F" opacity="0.055"/>
  <circle cx="126" cy="920" r="260" fill="#6366F1" opacity="0.05"/>

  <g transform="translate(72 70)">
    <circle cx="48" cy="48" r="48" fill="#1E3A5F"/>
    <path d="M29 58L41 36L53 58" stroke="#7D91B3" stroke-opacity="0.32" stroke-width="1.4"/>
    <path d="M47 58L59 36L71 58" stroke="#7D91B3" stroke-opacity="0.32" stroke-width="1.4"/>
    <circle cx="41" cy="45" r="2" fill="#B8C8E6" fill-opacity="0.55"/>
    <circle cx="59" cy="45" r="2" fill="#B8C8E6" fill-opacity="0.55"/>
    <text x="48" y="59" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="700" letter-spacing="1">EL</text>
    <text x="124" y="42" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Emergent Logic</text>
    <text x="124" y="78" fill="#7D8DA8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">AI-Accelerated CRM Consulting</text>
  </g>

  <rect x="72" y="202" width="936" height="4" rx="2" fill="#6366F1" opacity="0.72"/>

  <g filter="url(#shadow)">
    <rect x="72" y="258" width="936" height="646" rx="34" fill="#FFFFFF" stroke="#D9E2F1"/>
  </g>

  <!-- EDITABLE TEXT: headline -->
  <text x="118" y="376" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="850" letter-spacing="-2.2">
    <tspan x="118" dy="0">Most businesses</tspan>
    <tspan x="118" dy="76">do not have a</tspan>
    <tspan x="118" dy="76">lead problem.</tspan>
  </text>

  <!-- EDITABLE TEXT: subheadline -->
  <text x="118" y="624" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750" letter-spacing="-0.5">
    They have a follow-up system problem.
  </text>

  <g transform="translate(118 704)">
    <rect width="844" height="116" rx="24" fill="#F8FAFC" stroke="#D9E2F1"/>
    <circle cx="62" cy="58" r="18" fill="#1E3A5F"/>
    <path d="M62 58H224C262 58 274 96 243 112L198 136" stroke="#637AA0" stroke-width="10" stroke-linecap="round"/>
    <circle cx="158" cy="58" r="16" fill="#6366F1"/>
    <circle cx="248" cy="58" r="16" fill="#A7B6D8"/>
    <path d="M342 42H754" stroke="#A7B6D8" stroke-width="9" stroke-linecap="round"/>
    <path d="M342 76H662" stroke="#CBD5E1" stroke-width="9" stroke-linecap="round"/>
    <text x="342" y="72" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800">Form submitted. Follow-up unclear.</text>
  </g>

  <text x="72" y="984" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800">Cleaner CRM. Faster follow-up.</text>
  <text x="1008" y="984" fill="#637AA0" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" text-anchor="end">emergent-logic.ca</text>
</svg>
