<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Logic CRM cleanup checklist square social template</title>
  <desc id="desc">A reusable square social media graphic about messy CRM cleanup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#022C22"/>
      <stop offset="0.54" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="white" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#dots)"/>
  <circle cx="886" cy="914" r="290" fill="#34D399" opacity="0.12"/>
  <circle cx="154" cy="156" r="240" fill="#22D3EE" opacity="0.1"/>

  <g transform="translate(72 68)">
    <circle cx="24" cy="24" r="8" fill="#5EEAD4"/>
    <circle cx="66" cy="24" r="8" fill="#5EEAD4"/>
    <circle cx="45" cy="60" r="8" fill="#5EEAD4"/>
    <circle cx="24" cy="96" r="8" fill="#5EEAD4"/>
    <circle cx="66" cy="96" r="8" fill="#5EEAD4"/>
    <circle cx="45" cy="132" r="8" fill="#5EEAD4"/>
    <path d="M24 24L66 24L45 60L24 24ZM45 60L24 96L66 96L45 60ZM24 96L45 132L66 96" stroke="#CCFBF1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="112" y="52" fill="#ECFEFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" letter-spacing="0.06em">EMERGENT LOGIC</text>
    <text x="112" y="90" fill="#99F6E4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="0.08em">CRM CLEANUP</text>
  </g>

  <!-- EDITABLE TEXT: headline -->
  <text x="72" y="278" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="850" letter-spacing="-0.045em">
    <tspan x="72" dy="0">Your CRM is not</tspan>
    <tspan x="72" dy="82">broken.</tspan>
  </text>
  <text x="72" y="456" fill="#CCFBF1" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.025em">
    It is just messy enough to cost revenue.
  </text>

  <g filter="url(#shadow)" transform="translate(72 548)">
    <rect x="0" y="0" width="936" height="314" rx="42" fill="url(#card)" stroke="white" stroke-opacity="0.18"/>
    <g transform="translate(52 48)">
      <rect x="0" y="0" width="242" height="218" rx="28" fill="#F8FAFC"/>
      <text x="30" y="54" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Before</text>
      <circle cx="42" cy="102" r="9" fill="#F97316"/>
      <text x="66" y="110" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Duplicates</text>
      <circle cx="42" cy="148" r="9" fill="#F97316"/>
      <text x="66" y="156" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Bad stages</text>
      <circle cx="42" cy="194" r="9" fill="#F97316"/>
      <text x="66" y="202" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">No owner</text>
    </g>
    <path d="M342 157H478" stroke="#5EEAD4" stroke-width="12" stroke-linecap="round"/>
    <path d="M442 119L480 157L442 195" stroke="#5EEAD4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(548 48)">
      <rect x="0" y="0" width="312" height="218" rx="28" fill="#ECFEFF"/>
      <text x="30" y="54" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">After</text>
      <path d="M34 103L54 123L91 84" stroke="#059669" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="112" fill="#115E59" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Clean fields</text>
      <path d="M34 151L54 171L91 132" stroke="#059669" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="160" fill="#115E59" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Clear ownership</text>
      <path d="M34 199L54 219L91 180" stroke="#059669" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="208" fill="#115E59" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Trusted reports</text>
    </g>
  </g>

  <!-- EDITABLE TEXT: bottom CTA -->
  <rect x="72" y="922" width="936" height="78" rx="24" fill="#ECFEFF"/>
  <text x="116" y="973" fill="#134E4A" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="850">CRM cleanup before more automation.</text>
  <text x="958" y="973" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="850" text-anchor="end">emergent-logic.ca</text>
</svg>
