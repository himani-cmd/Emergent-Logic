<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Logic CRM cleanup social template</title>
  <desc id="desc">Brand-faithful CRM cleanup square social template using navy and muted blue.</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#132943"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#navy)"/>
  <circle cx="825" cy="148" r="280" fill="#FFFFFF" opacity="0.045"/>
  <circle cx="72" cy="1000" r="310" fill="#7D91B3" opacity="0.12"/>

  <g transform="translate(72 70)">
    <circle cx="48" cy="48" r="48" fill="#29486F"/>
    <path d="M29 58L41 36L53 58" stroke="#8FA7CD" stroke-opacity="0.36" stroke-width="1.4"/>
    <path d="M47 58L59 36L71 58" stroke="#8FA7CD" stroke-opacity="0.36" stroke-width="1.4"/>
    <circle cx="41" cy="45" r="2" fill="#B8C8E6" fill-opacity="0.55"/>
    <circle cx="59" cy="45" r="2" fill="#B8C8E6" fill-opacity="0.55"/>
    <text x="48" y="59" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="700" letter-spacing="1">EL</text>
    <text x="124" y="42" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Emergent Logic</text>
    <text x="124" y="78" fill="#B8C8E6" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">CRM Cleanup</text>
  </g>

  <!-- EDITABLE TEXT: headline -->
  <text x="72" y="286" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="850" letter-spacing="-2.1">
    <tspan x="72" dy="0">Your CRM is not</tspan>
    <tspan x="72" dy="76">broken.</tspan>
  </text>
  <text x="72" y="460" fill="#D7E2F5" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="750" letter-spacing="-0.5">
    It is messy enough to cost revenue.
  </text>

  <g filter="url(#shadow)" transform="translate(72 548)">
    <rect width="936" height="316" rx="34" fill="#FFFFFF"/>
    <rect x="42" y="42" width="254" height="232" rx="28" fill="#F4F7FB" stroke="#D9E2F1"/>
    <text x="76" y="96" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850">Before</text>
    <circle cx="84" cy="144" r="9" fill="#C7664E"/>
    <circle cx="84" cy="190" r="9" fill="#C7664E"/>
    <circle cx="84" cy="236" r="9" fill="#C7664E"/>
    <text x="110" y="152" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="750">Duplicates</text>
    <text x="110" y="198" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="750">Bad stages</text>
    <text x="110" y="244" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="750">No owner</text>

    <path d="M366 158H504" stroke="#637AA0" stroke-width="10" stroke-linecap="round"/>
    <path d="M474 124L508 158L474 192" stroke="#637AA0" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="586" y="42" width="308" height="232" rx="28" fill="#EEF3FA" stroke="#D9E2F1"/>
    <text x="622" y="96" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850">After</text>
    <path d="M626 146L646 166L688 124" stroke="#1E3A5F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M626 194L646 214L688 172" stroke="#1E3A5F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M626 242L646 262L688 220" stroke="#1E3A5F" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="716" y="154" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Clean fields</text>
    <text x="716" y="202" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Clear ownership</text>
    <text x="716" y="250" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Trusted reports</text>
  </g>

  <rect x="72" y="922" width="936" height="76" rx="22" fill="#FFFFFF" opacity="0.95"/>
  <text x="116" y="971" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850">CRM cleanup before more automation.</text>
  <text x="958" y="971" fill="#637AA0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="end">emergent-logic.ca</text>
</svg>
