<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Logic workflow map portrait template</title>
  <desc id="desc">Brand-faithful portrait template for lead capture workflow posts.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1080" y2="1350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F7FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#1E3A5F" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1080" height="1350" fill="url(#paper)"/>
  <path d="M0 0H1080V246H0V0Z" fill="#1E3A5F"/>
  <circle cx="916" cy="72" r="230" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="72" cy="1310" r="280" fill="#6366F1" opacity="0.05"/>

  <g transform="translate(72 70)">
    <circle cx="48" cy="48" r="48" fill="#29486F"/>
    <path d="M29 58L41 36L53 58" stroke="#8FA7CD" stroke-opacity="0.36" stroke-width="1.4"/>
    <path d="M47 58L59 36L71 58" stroke="#8FA7CD" stroke-opacity="0.36" stroke-width="1.4"/>
    <text x="48" y="59" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="700" letter-spacing="1">EL</text>
    <text x="124" y="42" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Emergent Logic</text>
    <text x="124" y="78" fill="#B8C8E6" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Lead Capture Systems</text>
  </g>

  <!-- EDITABLE TEXT: headline -->
  <text x="72" y="380" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="850" letter-spacing="-2.4">
    <tspan x="72" dy="0">What happens</tspan>
    <tspan x="72" dy="84">after the form</tspan>
    <tspan x="72" dy="84">submit?</tspan>
  </text>
  <text x="72" y="664" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="750">
    If nobody can answer this, revenue leaks.
  </text>

  <g filter="url(#shadow)" transform="translate(72 760)">
    <rect width="936" height="424" rx="34" fill="#FFFFFF" stroke="#D9E2F1"/>
    <g font-family="Inter, Arial, sans-serif" font-weight="800">
      <rect x="56" y="58" width="824" height="64" rx="18" fill="#F4F7FB" stroke="#D9E2F1"/>
      <text x="92" y="99" fill="#1E3A5F" font-size="25">1. Lead captured</text>
      <circle cx="826" cy="90" r="14" fill="#1E3A5F"/>

      <path d="M468 128V162" stroke="#A7B6D8" stroke-width="7" stroke-linecap="round"/>
      <rect x="56" y="164" width="824" height="64" rx="18" fill="#F8FAFC" stroke="#D9E2F1"/>
      <text x="92" y="205" fill="#1E3A5F" font-size="25">2. CRM record created</text>
      <circle cx="826" cy="196" r="14" fill="#637AA0"/>

      <path d="M468 234V268" stroke="#A7B6D8" stroke-width="7" stroke-linecap="round"/>
      <rect x="56" y="270" width="824" height="64" rx="18" fill="#F8FAFC" stroke="#D9E2F1"/>
      <text x="92" y="311" fill="#1E3A5F" font-size="25">3. Owner assigned</text>
      <circle cx="826" cy="302" r="14" fill="#6366F1"/>

      <path d="M468 340V374" stroke="#A7B6D8" stroke-width="7" stroke-linecap="round"/>
      <rect x="56" y="376" width="824" height="64" rx="18" fill="#EEF3FA" stroke="#D9E2F1"/>
      <text x="92" y="417" fill="#1E3A5F" font-size="25">4. Follow-up due</text>
      <circle cx="826" cy="408" r="14" fill="#1E3A5F"/>
    </g>
  </g>

  <text x="72" y="1278" fill="#1E3A5F" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850">Template: replace steps with your workflow.</text>
  <text x="1008" y="1278" fill="#637AA0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="end">emergent-logic.ca</text>
</svg>
