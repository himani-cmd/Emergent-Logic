<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Emergent Logic workflow map portrait social template</title>
  <desc id="desc">A reusable portrait social media graphic showing a lead workflow map.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.5" stop-color="#312E81"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <path d="M-42 106C190 38 335 94 476 196C653 325 785 224 1135 122" stroke="#A5B4FC" stroke-opacity="0.12" stroke-width="120"/>
  <path d="M-60 1178C210 1056 396 1104 576 1210C725 1298 864 1260 1140 1166" stroke="#F97316" stroke-opacity="0.12" stroke-width="130"/>

  <g transform="translate(72 70)">
    <circle cx="24" cy="24" r="8" fill="#F97316"/>
    <circle cx="66" cy="24" r="8" fill="#818CF8"/>
    <circle cx="45" cy="60" r="8" fill="#A78BFA"/>
    <circle cx="24" cy="96" r="8" fill="#818CF8"/>
    <circle cx="66" cy="96" r="8" fill="#F97316"/>
    <circle cx="45" cy="132" r="8" fill="#A78BFA"/>
    <path d="M24 24L66 24L45 60L24 24ZM45 60L24 96L66 96L45 60ZM24 96L45 132L66 96" stroke="#E0E7FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="112" y="50" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="850" letter-spacing="0.05em">EMERGENT LOGIC</text>
    <text x="112" y="90" fill="#FDBA74" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800" letter-spacing="0.08em">LEAD CAPTURE SYSTEMS</text>
  </g>

  <!-- EDITABLE TEXT: headline -->
  <text x="72" y="286" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="850" letter-spacing="-0.045em">
    <tspan x="72" dy="0">What happens</tspan>
    <tspan x="72" dy="86">after the form</tspan>
    <tspan x="72" dy="86">submit?</tspan>
  </text>
  <text x="72" y="560" fill="#DDD6FE" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="650">
    If nobody can answer this, revenue leaks.
  </text>

  <g filter="url(#shadow)" transform="translate(116 650)">
    <rect x="0" y="0" width="848" height="520" rx="46" fill="white" fill-opacity="0.09" stroke="white" stroke-opacity="0.16"/>
    <g font-family="Arial, Helvetica, sans-serif" font-weight="800">
      <rect x="64" y="58" width="720" height="70" rx="22" fill="#FFFFFF"/>
      <text x="100" y="103" fill="#111827" font-size="27">1. Lead captured</text>
      <circle cx="720" cy="93" r="20" fill="#F97316"/>

      <path d="M424 136V176" stroke="#C7D2FE" stroke-width="8" stroke-linecap="round"/>
      <rect x="64" y="178" width="720" height="70" rx="22" fill="#F8FAFC" fill-opacity="0.94"/>
      <text x="100" y="223" fill="#111827" font-size="27">2. CRM record created</text>
      <circle cx="720" cy="213" r="20" fill="#8B5CF6"/>

      <path d="M424 256V296" stroke="#C7D2FE" stroke-width="8" stroke-linecap="round"/>
      <rect x="64" y="298" width="720" height="70" rx="22" fill="#F8FAFC" fill-opacity="0.88"/>
      <text x="100" y="343" fill="#111827" font-size="27">3. Owner assigned</text>
      <circle cx="720" cy="333" r="20" fill="#22D3EE"/>

      <path d="M424 376V416" stroke="#C7D2FE" stroke-width="8" stroke-linecap="round"/>
      <rect x="64" y="418" width="720" height="70" rx="22" fill="#FEF3C7"/>
      <text x="100" y="463" fill="#111827" font-size="27">4. Follow-up due</text>
      <circle cx="720" cy="453" r="20" fill="#F97316"/>
    </g>
  </g>

  <rect x="72" y="1226" width="936" height="76" rx="24" fill="url(#accent)"/>
  <text x="116" y="1275" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="850">Template: replace steps with your workflow.</text>
  <text x="958" y="1275" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="850" text-anchor="end">emergent-logic.ca</text>
</svg>
