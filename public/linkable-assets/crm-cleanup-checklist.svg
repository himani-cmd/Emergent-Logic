<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">CRM cleanup checklist</title>
  <desc id="desc">A visual CRM cleanup checklist covering duplicates, lifecycle stages, owners, required fields, workflows, and reporting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.48" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="44" fill="url(#bg)"/>
  <path d="M1020 0h380v900h-240c-160-220-170-460-140-900Z" fill="#6366F1" opacity="0.08"/>
  <circle cx="148" cy="126" r="80" fill="#F97316" opacity="0.12"/>

  <text x="80" y="120" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#6366F1">EMERGENT LOGIC</text>
  <text x="80" y="200" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="900" fill="#0F172A">CRM Cleanup Checklist</text>
  <text x="82" y="250" font-family="Inter, Arial, sans-serif" font-size="25" fill="#475569">Clean the system before adding more automation.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="315" width="1240" height="455" rx="40" fill="#FFFFFF"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(135 370)">
      <circle cx="18" cy="18" r="18" fill="#EEF2FF"/>
      <path d="M9 18l6 6 13-15" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="25" font-size="25" font-weight="800" fill="#0F172A">Duplicates</text>
      <text x="54" y="60" font-size="18" fill="#64748B">Merge records safely, preserve history, and avoid duplicate companies.</text>
    </g>

    <g transform="translate(135 470)">
      <circle cx="18" cy="18" r="18" fill="#FFF7ED"/>
      <path d="M9 18l6 6 13-15" fill="none" stroke="#F97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="25" font-size="25" font-weight="800" fill="#0F172A">Lifecycle Stages</text>
      <text x="54" y="60" font-size="18" fill="#64748B">Define lead, MQL, SQL, opportunity, customer, and lost rules.</text>
    </g>

    <g transform="translate(135 570)">
      <circle cx="18" cy="18" r="18" fill="#ECFDF5"/>
      <path d="M9 18l6 6 13-15" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="25" font-size="25" font-weight="800" fill="#0F172A">Ownership</text>
      <text x="54" y="60" font-size="18" fill="#64748B">Every open lead has a clear owner and follow-up responsibility.</text>
    </g>

    <g transform="translate(720 370)">
      <circle cx="18" cy="18" r="18" fill="#EEF2FF"/>
      <path d="M9 18l6 6 13-15" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="25" font-size="25" font-weight="800" fill="#0F172A">Required Fields</text>
      <text x="54" y="60" font-size="18" fill="#64748B">Keep fields useful, searchable, and tied to real process decisions.</text>
    </g>

    <g transform="translate(720 470)">
      <circle cx="18" cy="18" r="18" fill="#FFF7ED"/>
      <path d="M9 18l6 6 13-15" fill="none" stroke="#F97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="25" font-size="25" font-weight="800" fill="#0F172A">Workflow Logic</text>
      <text x="54" y="60" font-size="18" fill="#64748B">Review enrollment, suppression, delays, exits, and ownership changes.</text>
    </g>

    <g transform="translate(720 570)">
      <circle cx="18" cy="18" r="18" fill="#ECFDF5"/>
      <path d="M9 18l6 6 13-15" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="25" font-size="25" font-weight="800" fill="#0F172A">Reporting Trust</text>
      <text x="54" y="60" font-size="18" fill="#64748B">Dashboards should match how sales and marketing actually work.</text>
    </g>
  </g>

  <rect x="160" y="690" width="1080" height="70" rx="24" fill="#1E3A5F"/>
  <text x="200" y="735" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#FFFFFF">Rule: never automate a CRM your team does not trust.</text>
  <text x="80" y="842" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748B">Use with attribution: emergent-logic.ca/services/crm-cleanup</text>
</svg>
