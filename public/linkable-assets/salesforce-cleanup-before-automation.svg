<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Salesforce cleanup before automation map</title>
  <desc id="desc">A visual map showing why Salesforce cleanup should come before new automation, flows, reporting, integrations, and AI workflows.</desc>
  <defs>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="44" fill="url(#dark)"/>
  <circle cx="1220" cy="110" r="240" fill="#6366F1" opacity="0.24"/>
  <circle cx="170" cy="790" r="300" fill="#F97316" opacity="0.16"/>

  <text x="78" y="110" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#A5B4FC">EMERGENT LOGIC</text>
  <text x="78" y="195" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" fill="#FFFFFF">Salesforce Cleanup Before Automation</text>
  <text x="80" y="245" font-family="Inter, Arial, sans-serif" font-size="25" fill="#DDE5FF">Dirty CRM data turns every new Flow into a future support ticket.</text>

  <g filter="url(#shadow)">
    <rect x="95" y="335" width="330" height="260" rx="36" fill="url(#card)"/>
    <text x="135" y="395" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="900" fill="#0F172A">If you automate first</text>
    <text x="135" y="450" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Bad fields trigger bad logic.</text>
    <text x="135" y="486" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Duplicates route twice.</text>
    <text x="135" y="522" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Reports drift from reality.</text>
    <text x="135" y="558" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Users stop trusting the org.</text>

    <rect x="535" y="335" width="330" height="260" rx="36" fill="#FFFFFF"/>
    <text x="575" y="395" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="900" fill="#0F172A">Clean foundation</text>
    <text x="575" y="450" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Field audit</text>
    <text x="575" y="486" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Duplicate strategy</text>
    <text x="575" y="522" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Owner rules</text>
    <text x="575" y="558" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Safe testing plan</text>

    <rect x="975" y="335" width="330" height="260" rx="36" fill="url(#card)"/>
    <text x="1015" y="395" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="900" fill="#0F172A">Then automate</text>
    <text x="1015" y="450" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Flows</text>
    <text x="1015" y="486" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Lead routing</text>
    <text x="1015" y="522" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">Reporting</text>
    <text x="1015" y="558" font-family="Inter, Arial, sans-serif" font-size="20" fill="#475569">AI-assisted workflows</text>
  </g>

  <g fill="none" stroke="#A5B4FC" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M450 465h60"/>
    <path d="M494 446l20 19-20 19"/>
    <path d="M890 465h60"/>
    <path d="M934 446l20 19-20 19"/>
  </g>

  <rect x="145" y="675" width="1110" height="94" rx="30" fill="#FFFFFF" opacity="0.10"/>
  <text x="190" y="734" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800" fill="#FFFFFF">Better sequence: cleanup → test → automate → monitor.</text>
  <text x="80" y="842" font-family="Inter, Arial, sans-serif" font-size="18" fill="#DDE5FF">Use with attribution: emergent-logic.ca/blog/salesforce-cleanup-before-automation</text>
</svg>
