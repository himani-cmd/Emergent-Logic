<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Website lead to CRM routing flow</title>
  <desc id="desc">A visual workflow showing how a website lead should move from form submission into CRM routing, ownership, follow-up, and reporting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="0.52" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1E293B" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="44" fill="url(#bg)"/>
  <circle cx="1190" cy="120" r="180" fill="#6366F1" opacity="0.10"/>
  <circle cx="1210" cy="760" r="260" fill="#F97316" opacity="0.08"/>
  <circle cx="160" cy="720" r="210" fill="#1E3A5F" opacity="0.08"/>

  <g transform="translate(70 62)">
    <g>
      <circle cx="18" cy="18" r="7" fill="#6366F1"/>
      <circle cx="54" cy="18" r="7" fill="#6366F1"/>
      <circle cx="36" cy="49" r="7" fill="#6366F1"/>
      <circle cx="18" cy="80" r="7" fill="#6366F1"/>
      <circle cx="54" cy="80" r="7" fill="#6366F1"/>
      <circle cx="36" cy="49" r="4" fill="#1E3A5F"/>
      <path d="M18 18 54 18 36 49 18 80 54 80 36 49 18 18" fill="none" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="92" y="28" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#1E3A5F">Emergent Logic</text>
    <text x="92" y="62" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#475569">Lead capture systems that do not leak revenue</text>
  </g>

  <text x="76" y="192" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" fill="#0F172A">Website Lead to CRM Flow</text>
  <text x="78" y="238" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="500" fill="#475569">A form submission is not the finish line. It is the start of a routed revenue process.</text>

  <g filter="url(#shadow)">
    <rect x="76" y="315" width="250" height="170" rx="30" fill="#FFFFFF"/>
    <rect x="76" y="315" width="250" height="10" rx="5" fill="#6366F1"/>
    <text x="106" y="370" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0F172A">1. Lead Captured</text>
    <text x="106" y="415" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Form, landing page, chat,</text>
    <text x="106" y="443" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">call request, or booking.</text>

    <rect x="392" y="315" width="250" height="170" rx="30" fill="#FFFFFF"/>
    <rect x="392" y="315" width="250" height="10" rx="5" fill="#F97316"/>
    <text x="422" y="370" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0F172A">2. Source Stored</text>
    <text x="422" y="415" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">UTM, page URL, form name,</text>
    <text x="422" y="443" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">campaign, and referrer.</text>

    <rect x="708" y="315" width="250" height="170" rx="30" fill="#FFFFFF"/>
    <rect x="708" y="315" width="250" height="10" rx="5" fill="#10B981"/>
    <text x="738" y="370" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0F172A">3. Owner Assigned</text>
    <text x="738" y="415" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Route by service, location,</text>
    <text x="738" y="443" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">language, urgency, or team.</text>

    <rect x="1024" y="315" width="250" height="170" rx="30" fill="#FFFFFF"/>
    <rect x="1024" y="315" width="250" height="10" rx="5" fill="#1E3A5F"/>
    <text x="1054" y="370" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0F172A">4. Follow-Up Triggered</text>
    <text x="1054" y="415" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Task, reminder, notification,</text>
    <text x="1054" y="443" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">email, or booked call.</text>
  </g>

  <g fill="none" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M338 400H380"/>
    <path d="M368 388l12 12-12 12"/>
    <path d="M654 400H696"/>
    <path d="M684 388l12 12-12 12"/>
    <path d="M970 400h42"/>
    <path d="M1000 388l12 12-12 12"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="210" y="590" width="980" height="160" rx="36" fill="url(#navy)"/>
    <text x="260" y="648" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF">The output: sales visibility</text>
    <text x="260" y="694" font-family="Inter, Arial, sans-serif" font-size="22" fill="#DDE5FF">Every inquiry has a source, owner, next step, status, and reporting trail.</text>
    <text x="260" y="729" font-family="Inter, Arial, sans-serif" font-size="18" fill="#A5B4FC">Use with attribution: emergent-logic.ca</text>
  </g>
</svg>
